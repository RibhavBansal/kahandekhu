# Wrangler config for the KahanDekhu Telegram bot Worker.
# Deploy with:  wrangler deploy -c wrangler.telegram.toml

name = "kahandekhu-telegram"
main = "telegram.worker.js"
compatibility_date = "2024-11-01"

[vars]
TMDB_PROXY = "https://kahandekhu-tmdb.bansalribhav0987.workers.dev"
APP_URL    = "https://kahandekhu.pages.dev"

# Service binding: lets this Worker call the TMDB proxy Worker on the same account
# (a plain fetch() to its public URL is blocked with Cloudflare error 1042).
[[services]]
binding = "TMDB"
service = "kahandekhu-tmdb"

# Secrets (NOT stored here) — set with:
#   wrangler secret put BOT_TOKEN       -c wrangler.telegram.toml
#   wrangler secret put WEBHOOK_SECRET  -c wrangler.telegram.toml
