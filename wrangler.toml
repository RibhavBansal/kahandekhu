# Wrangler config for the KahanDekhu Web Push Worker.
# Deploy with:  wrangler deploy

name = "kahandekhu-push"
main = "push.worker.js"
compatibility_date = "2024-11-01"

# D1 binding — paste your database_id after `wrangler d1 create kahandekhu-push`
 [[d1_databases]]
     binding = "DB"
     database_name = "kahandekhu-push"
     database_id = "047fd534-ece8-4e68-8e85-20c06c231ad1"
     
     # Re-check reminders every 6 hours.
 [triggers]
     crons = ["0 */6 * * *"]
     
     # Public, non-secret config.
 [vars]
     VAPID_PUBLIC   = "BEyo9E1f3uPLscC8_b8kFGcg3I1UE-CmYbmaQe9OOqXTswii6o5gtXxmtXDSLbcxc3sUaaCZNLDY_mE3_M9rexs"
     VAPID_SUBJECT  = "mailto:bansalribhav0987@gmail.com"
     TMDB_PROXY     = "https://kahandekhu-tmdb.bansalribhav0987.workers.dev"
     DEFAULT_APP_URL = "https://kahandekhu.pages.dev"
     
     # Secrets are NOT stored here. Set them with:
     #   wrangler secret put VAPID_PRIVATE
     #   wrangler secret put RUN_SECRET
